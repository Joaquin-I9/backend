<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Motorepuestos</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-checking">
    <div id="navbar"></div>

    <div class="container">
        <h1>⚙️ Inventario de Motorepuestos</h1>

        <div class="card" id="form-card">
            <h2 id="form-title">Agregar Repuesto</h2>
            <form id="repuesto-form">
                <input type="hidden" id="repuesto-id">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="nombre" required placeholder="Ej: Pastillas de freno">
                </div>
                <div class="form-group">
                    <label>Marca:</label>
                    <input type="text" id="marca" required placeholder="Ej: Honda">
                </div>
                <div class="form-group">
                    <label>Precio ($):</label>
                    <input type="number" id="precio" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Stock:</label>
                    <input type="number" id="stock" required min="0">
                </div>

                <button type="submit" id="btn-save">Guardar Repuesto</button>
                <button type="button" id="btn-cancel" class="btn-secondary" style="display: none;">Cancelar</button>
            </form>
        </div>

        <div class="card">
            <h2>Lista de Repuestos</h2>
            <table id="tabla-repuestos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th id="th-acciones">Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="../productos.js"></script>
</body>
</html>
