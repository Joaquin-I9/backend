<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Motorepuestos</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-checking">
    <div id="navbar"></div>

    <div class="container">
        <h1>👥 Gestión de Usuarios</h1>

        <div class="card">
            <h2 id="user-form-title">Agregar Usuario</h2>
            <form id="usuario-form">
                <input type="hidden" id="usuario-id">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="u-nombre" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="u-email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="u-password" placeholder="Dejar vacío para no cambiar (al editar)">
                </div>
                <div class="form-group">
                    <label>Rol:</label>
                    <select id="u-rol" required>
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="SUPERADMIN">SUPERADMIN</option>
                    </select>
                </div>

                <button type="submit">Guardar Usuario</button>
                <button type="button" id="btn-cancel-user" class="btn-secondary" style="display: none;">Cancelar</button>
            </form>
        </div>

        <div class="card">
            <h2>Lista de Usuarios</h2>
            <table id="tabla-usuarios">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="../users.js"></script>
</body>
</html>
